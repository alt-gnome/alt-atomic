        - fonts-ttf-jetbrains-mono-nl
        - fonts-ttf-liberation
        - gnome-icon-theme
        - gnome-icon-theme-symbolic
        - gnome-themes-extra
        - icon-theme-adwaita
        - icon-theme-morewaita
        - libgtk2-engine-adwaita

        # Third-party
        - firefox

