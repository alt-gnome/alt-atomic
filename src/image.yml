image: ${{ Env.IMAGE }}

modules:
  - name: Update packages
    type: packages
    body:
      update: true

  - name: Set branding
    if: Env.BUILD == "default"
    type: branding
    body:
      name: alt-atomic-${{ Env.IMAGE_NAME }}
      build-type: ${{ Env.IMAGE_TYPE }}

  - name: Install packages
    if: Env.BUILD == "default"
    type: include
    body:
      targets:
        - packages.yml

  - name: Copy root
    if: Env.BUILD == "default"
    type: copy
    body:
      source: root
      destination: /
      replace: true

  - type: include
    if: Env.BUILD == "default"
    body:
      targets:
        - network.yml
        - systemd.yml
        - settings.yml

  - type: include
    if: Env.BUILD == "nvidia"
    body:
      targets:
        - /usr/share/apm/includes/common/nvidia.yml

  - type: kernel
    body:
      initrd:
        method: dracut
        plymouth-theme: atomic

  - name: Cleanup
    type: include
    body:
      targets:
        - /usr/share/apm/includes/common/cleanup.yml
