name: Build noightly image
description: Build, rechunk, lint and push nightly image

inputs:
  build:
    required: true
    description: ''
  image-name:
    required: true
    description: ''
  name-pretty:
    required: true
    description: ''
  date:
    required: true
    description: ''
  pretty-date:
    required: true
    description: ''
  commit:
    required: true
    description: ''
  registry-token:
    required: true
    description: ''
  cosign-image-sign:
    required: true
    description: ''
  cosign-password:
    required: true
    description: ''
  local-build-name:
    required: true
    description: ''
    default: localhost/onyx
  registry:
    required: true
    description: ''
    default: altlinux.space

runs:
  using: composite
  steps:
  - name: Build sisyphus default image
    run: |
      set -x

      if [[ "${{ inputs.build }}" == "default" ]]; then
        IMAGE="${{ inputs.registry }}/alt-atomic/core/nightly:${{ inputs.date }}"
      else
        IMAGE="${{ inputs.registry }}/${{ github.repository }}/nightly:${{ inputs.commit }}"
      fi

      podman build \
        --tag ${{ inputs.local-build-name }} \
        --platform linux/amd64 \
        --build-arg IMAGE=$IMAGE \
        --build-arg BUILD=${{ inputs.build }} \
        --build-arg IMAGE_TYPE=nightly \
        --file ./container-files/main \
        .

  - name: Rechunk image
    uses: alt-atomic/actions/rechunk@main
    id: rechunk
    if: (github.event_name == 'push' && github.ref_name == 'main' ) || contains(fromJSON('["workflow_dispatch", "schedule"]'), github.event_name)
    with:
      ref: ${{ inputs.local-build-name }}
      prev-ref: >-
        ${{ 
          github.ref_name == 'main' &&
          format('{0}/{1}/nightly:latest', inputs.registry, inputs.image-name) ||
          format('{0}/{1}/nightly-branch:{2}', inputs.registry, inputs.image-name, github.ref_name)
        }}
      labels: |
        org.altlinux.repo.date=${{ inputs.pretty-date }}
        org.opencontainers.image.title=ALT Atomic Onyx Nightly ${{ inputs.name-pretty }}
        org.opencontainers.image.description=ALT Atomic with GNOME, nightly build ${{ inputs.name-pretty }}
        org.opencontainers.image.source=https://altlinux.space/alt-atomic/onyx
        org.opencontainers.image.licenses=GPL-3.0-or-later
        org.opencontainers.image.vendor=ALT Atomic Team

  - name: Push and sign images
    uses: alt-atomic/actions/push-and-sign@main
    if: >
      contains(fromJSON('["push", "workflow_dispatch", "schedule"]'), github.event_name)
    with:
      registry: ${{ inputs.registry }}
      registry-username: "<token>"
      registry-password: ${{ inputs.registry-token }}
      image-name: >-
        ${{
          github.ref_name == 'main' &&
          format('{0}/nightly', inputs.image-name) ||
          format('{0}/nightly-branch', inputs.image-name)
        }}
      image-tag: >-
        ${{ 
          github.ref_name == 'main' && 
          'latest' || 
          github.ref_name 
        }}
      image-aliases: >-
        ${{ 
          github.ref_name == 'main' && 
          inputs.date || 
          ''
        }} ${{ inputs.commit }}
      local-build-name: ${{ steps.rechunk.outputs.ref }}
      cosign-image-sign: ${{ inputs.cosign-image-sign }}
      cosign-password: ${{ inputs.cosign-password }}
