on:
  workflow_call:
    inputs:
      build:
        required: true
        type: string
      image-name:
        required: true
        type: string
      name-pretty:
        required: true
        type: string
      date:
        required: true
        type: string
      pretty-date:
        required: true
        type: string
      commit:
        required: true
        type: string

env:
  LOCAL_BUILD_NAME: localhost/onyx
  REGISTRY: altlinux.space

jobs:
  build:
    name: Build image ${{ inputs.build }}
    runs-on: als-huge

    container:
      image: altlinux.space/actions/runner/containers:sisyphus
    steps:
    - name: Prepare env
      uses: alt-atomic/actions/prepare-env@main

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.commit }}

    - name: Build sisyphus default image
      run: |
        set -x

        if [[ "${{ inputs.build }}" == "default" ]]; then
          IMAGE="$REGISTRY/alt-atomic/core/nightly:${{ inputs.date }}"
        else
          IMAGE="$REGISTRY/${{ github.repository }}:${{ inputs.commit }}"
        fi

        podman build \
          --tag $LOCAL_BUILD_NAME \
          --platform linux/amd64 \
          --build-arg IMAGE=$IMAGE \
          --build-arg BUILD=${{ inputs.build }} \
          --build-arg IMAGE_TYPE=nightly \
          --file ./container-files/main \
          .

    - name: Rechunk image
      uses: alt-atomic/actions/rechunk@main
      id: rechunk
      if: (github.event_name == 'push' && github.ref_name == 'main' ) || contains(fromJSON('["workflow_dispatch", "schedule"]'), github.event_name)
      with:
        ref: ${{ env.LOCAL_BUILD_NAME }}
        prev-ref: >-
          ${{ 
            github.ref_name == 'main' &&
            format('{0}/{1}/nightly:latest', env.REGISTRY, inputs.image-name) ||
            format('{0}/{1}/nightly-branch:{2}', env.REGISTRY, inputs.image-name, github.ref_name)
          }}
        labels: |
          org.altlinux.repo.date=${{ inputs.pretty-date }}
          org.opencontainers.image.title=ALT Atomic Onyx Nightly ${{ inputs.name-pretty }}
          org.opencontainers.image.description=ALT Atomic with GNOME, nightly build ${{ inputs.name-pretty }}
          org.opencontainers.image.source=https://altlinux.space/alt-atomic/onyx
          org.opencontainers.image.licenses=GPL-3.0-or-later
          org.opencontainers.image.vendor=ALT Atomic Team

    - name: Push and sign images
      uses: alt-atomic/actions/push-and-sign@main
      if: >
        contains(fromJSON('["push", "workflow_dispatch", "schedule"]'), github.event_name)
      with:
        registry: ${{ env.REGISTRY }}
        registry-username: "<token>"
        registry-password: ${{ secrets.REGISTRY_TOKEN }}
        image-name: >-
          ${{
            github.ref_name == 'main' &&
            format('{0}/nightly', inputs.image-name) ||
            format('{0}/nightly-branch', inputs.image-name)
          }}
        image-tag: >-
          ${{ 
            github.ref_name == 'main' && 
            'latest' || 
            github.ref_name 
          }}
        image-aliases: >-
          ${{ 
            github.ref_name == 'main' && 
            inputs.date || 
            ''
          }} ${{ inputs.commit }}
        local-build-name: ${{ steps.rechunk.outputs.ref }}
        cosign-image-sign: ${{ secrets.IMAGE_SIGN }}
        cosign-password: ${{ secrets.COSIGN_PASSWORD }}
