name: Build stable images

on:
  workflow_dispatch:
  push:
    branches:
    - 'release-*'

env:
  REGISTRY: altlinux.space

jobs:
  gather-build-data:
    name: Gather build data
    runs-on: als-tiny

    outputs:
      date: ${{ steps.date.outputs.date }}
      pretty-date: ${{ steps.date.outputs.pretty-date }}
      commit: ${{ steps.get_commit.outputs.commit }} 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Read DATE
      id: repo_date
      run: |
        set -e

        echo "repo-date=$(cat ./DATE | tr -d '\n')" >> $FORGEJO_OUTPUT

    - name: Get date
      id: date
      uses: alt-atomic/actions/parse-date@main
      with:
        date: ${{ steps.repo_date.outputs.repo-date }}

    - id: get_commit
      name: Get current commit
      run: |
        echo "commit=$(git rev-parse HEAD)" >> $FORGEJO_OUTPUT

  build-default:
    name: Build default image
    runs-on: alt-sisyphus
    needs:
    - gather-build-data
    container:
      image: altlinux.space/alt-atomic/builder-image:sisyphus
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.gather-build-data.outputs.commit }}

    - name: Build default image
      uses: ./.forgejo/actions/build-and-push-prerelease-image
      with:
        build: default
        image-name: ${{ github.repository }}
        name-pretty: ''
        date: ${{ needs.gather-build-data.outputs.date }}
        pretty-date: ${{ needs.gather-build-data.outputs.pretty-date }}
        commit: ${{ needs.gather-build-data.outputs.commit }}
        registry-token: ${{ secrets.REGISTRY_TOKEN }}
        cosign-image-sign: ${{ secrets.IMAGE_SIGN }}
        cosign-password: ${{ secrets.COSIGN_PASSWORD }}
        local-build-name: localhost/onyx

  build-nvidia:
    name: Build nvidia image
    runs-on: alt-sisyphus
    needs:
    - gather-build-data
    - build-default
    container:
      image: altlinux.space/alt-atomic/builder-image:sisyphus
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.gather-build-data.outputs.commit }}

    - name: Build default image
      uses: ./.forgejo/actions/build-and-push-prerelease-image
      with:
        build: nvidia
        image-name: ${{ github.repository }}-nvidia
        name-pretty: (Nvidia)
        date: ${{ needs.gather-build-data.outputs.date }}
        pretty-date: ${{ needs.gather-build-data.outputs.pretty-date }}
        commit: ${{ needs.gather-build-data.outputs.commit }}
        registry-token: ${{ secrets.REGISTRY_TOKEN }}
        cosign-image-sign: ${{ secrets.IMAGE_SIGN }}
        cosign-password: ${{ secrets.COSIGN_PASSWORD }}
        local-build-name: localhost/onyx/nvidia
