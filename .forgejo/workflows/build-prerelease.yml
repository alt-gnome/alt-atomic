name: Build stable images

on:
  push:
    branches:
    - 'release-*'

env:
  REGISTRY: altlinux.space

jobs:
  gather-build-data:
    name: Gather build data
    runs-on: als-tiny
    container:
      image: altlinux.space/alt-atomic/builder-image:sisyphus

    outputs:
      core-tag: ${{ steps.core_tag.outputs.core-tag }}
      repo-date: ${{ steps.date.outputs.repo-date }}
      commit: ${{ steps.get_commit.outputs.commit }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Read CORE_TAG
      id: core_tag
      run: |
        set -e

        tag=$(cat ./CORE_TAG)
        echo "core-tag=$tag" >> $FORGEJO_OUTPUT

    - name: Calcualte next tag version
      id: version
      run: |
        set -e

        PREFIX=${GITHUB_REF_NAME#release-}
        LAST_TAG=$(git tag -l "${PREFIX}.*" | sort -V | tail -n 1)

        if [ -z "$LAST_TAG" ]; then
            VERSION="${PREFIX}.0"
        else
            VERSION="${LAST_TAG%.*}.$(( ${LAST_TAG##*.} + 1 ))"
        fi

        echo "version=$VERSION" >> $FORGEJO_OUTPUT

    - name: Get core repo date
      id: date
      run: |
        set -e

        date=$(skopeo inspect --format '{{index .Labels "org.altlinux.repo.date"}}' docker://altlinux.space/alt-atomic/core/stable:${{ steps.core_tag.outputs.core-tag }})
        echo "repo-date=$date" >> $FORGEJO_OUTPUT

    - id: get_commit
      name: Get current commit
      run: |
        echo "commit=$(git rev-parse HEAD)" >> $FORGEJO_OUTPUT

  build-default:
    name: Build default image
    runs-on: als-huge
    needs:
    - gather-build-data
    container:
      image: altlinux.space/alt-atomic/builder-image:sisyphus
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.gather-build-data.outputs.commit }}

    - name: Build default image
      uses: ./.forgejo/actions/build-and-push-prerelease-image
      with:
        build: default
        image-name: ${{ github.repository }}
        name-pretty: ''
        core-tag: ${{ needs.gather-build-data.outputs.core-tag }}
        pretty-date: ${{ needs.gather-build-data.outputs.repo-date }}
        commit: ${{ needs.gather-build-data.outputs.commit }}
        version: ${{ needs.gather-build-data.outputs.version }}
        registry-token: ${{ secrets.REGISTRY_TOKEN }}
        cosign-image-sign: ${{ secrets.IMAGE_SIGN }}
        cosign-password: ${{ secrets.COSIGN_PASSWORD }}
        local-build-name: localhost/onyx

  build-nvidia:
    name: Build nvidia image
    runs-on: als-huge
    needs:
    - gather-build-data
    - build-default
    container:
      image: altlinux.space/alt-atomic/builder-image:sisyphus
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.gather-build-data.outputs.commit }}

    - name: Build default image
      uses: ./.forgejo/actions/build-and-push-prerelease-image
      with:
        build: nvidia
        image-name: ${{ github.repository }}-nvidia
        name-pretty: (Nvidia)
        core-tag: ${{ needs.gather-build-data.outputs.core-tag }}
        pretty-date: ${{ needs.gather-build-data.outputs.repo-date }}
        commit: ${{ needs.gather-build-data.outputs.commit }}
        version: ${{ needs.gather-build-data.outputs.version }}
        registry-token: ${{ secrets.REGISTRY_TOKEN }}
        cosign-image-sign: ${{ secrets.IMAGE_SIGN }}
        cosign-password: ${{ secrets.COSIGN_PASSWORD }}
        local-build-name: localhost/onyx/nvidia
